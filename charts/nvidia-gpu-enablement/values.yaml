nfd:
  channel: stable
  operand:
    servicePort: 12000
    imagePullPolicy: IfNotPresent
    # image: registry.redhat.io/openshift4/ose-node-feature-discovery-rhel9@sha256:b0f786e21798c27905c6fdf189bd91cae1f5ddd58ad101a28dbb8b5de92069ce
  prunerOnDelete: true
  topologyUpdater: false
  configData:
    core:
      sleepInterval: 60s
    sources:
      pci:
        deviceClassWhitelist:
          - "0200"
          - "03"
          - "12"
        deviceLabelFields:
          - "vendor"

gpuOperator:
  channel: v26.3
  timeSlices: 1
  policy:
    vgpuDeviceManager:
      config:
        default: default
      enabled: true
    migManager:
      config:
        default: all-disabled
      enabled: true
    operator:
      runtimeClass: nvidia
      use_ocp_driver_toolkit: true
    dcgm:
      enabled: true
    gfd:
      enabled: true
    dcgmExporter:
      config:
        name: ""
      serviceMonitor:
        enabled: true
      enabled: true
    cdi:
      default: false
      enabled: true
      nriPluginEnabled: false
    driver:
      licensingConfig:
        nlsEnabled: true
        secretName: ""
      kernelModuleType: auto
      certConfig:
        name: ""
      kernelModuleConfig:
        name: ""
      upgradePolicy:
        autoUpgrade: true
        drain:
          deleteEmptyDir: false
          enable: false
          force: false
          timeoutSeconds: 300
        maxParallelUpgrades: 1
        maxUnavailable: 25%
        podDeletion:
          deleteEmptyDir: false
          force: false
          timeoutSeconds: 300
        waitForCompletion:
          timeoutSeconds: 0
      repoConfig:
        configMapName: ""
      virtualTopology:
        config: ""
      enabled: true
      useNvidiaDriverCRD: false
    devicePlugin:
      config:
        name: "{{ if gt (int .Values.gpuOperator.timeSlices) 1 }}device-plugin-config{{ end }}"
        default: ""
      mps:
        root: /run/nvidia/mps
      enabled: true
    gdrcopy:
      enabled: false
    kataManager:
      config:
        artifactsDir: /opt/nvidia-gpu-operator/artifacts/runtimeclasses
    mig:
      strategy: single
    kataSandboxDevicePlugin:
      enabled: true
    ccManager:
      enabled: true
    sandboxDevicePlugin:
      enabled: true
    validator:
      plugin:
        env: []
    nodeStatusExporter:
      enabled: true
    daemonsets:
      rollingUpdate:
        maxUnavailable: "1"
      updateStrategy: RollingUpdate
      tolerations:
        - effect: NoSchedule
          operator: Exists
          key: nvidia.com/gpu
    sandboxWorkloads:
      defaultWorkload: container
      mode: kubevirt
      enabled: false
    gds:
      enabled: false
    vgpuManager:
      enabled: false
    vfioManager:
      enabled: true
    toolkit:
      installDir: /usr/local/nvidia
      enabled: true

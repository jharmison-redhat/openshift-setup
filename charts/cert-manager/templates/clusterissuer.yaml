{{- range $name, $acme := .Values.acme -}}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ $name }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
spec:
  acme:
    email: {{ $acme.email }}
    {{- with $acme.preferredChain }}
    preferredChain: {{ toYaml . }}
    {{- end }}
    privateKeySecretRef:
      name: acme-{{ $name }}-privatekey
    server: {{ $acme.server }}
    {{- with $acme.externalAccountBinding }}
    externalAccountBinding:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    solvers:
    {{- range $solver := $acme.solvers -}}
      {{- if eq $solver.type "dns" }}
      - dns01:
          {{- toYaml $solver.dnsConfig | nindent 10 }}
        {{- with $solver.dnsZones }}
        selector:
          dnsZones:
            {{- toYaml . | nindent 12 }}
        {{- end }}
      {{- else if eq $solver.type "http" }}
      - http01:
          ingress:
            ingressClassName: {{ $solver.ingressClassName }}
      {{- end }}
    {{- end }}
{{- end }}
{{- if .Values.ca.enabled }}
{{- if and .Values.ca.tlsCrt .Values.ca.tlsKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cert-manager-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
stringData:
  tls.crt: |-
    {{- .Values.ca.tlsCrt | nindent 4 }}
  tls.key: |-
    {{- .Values.ca.tlsKey | nindent 4 }}
{{- else }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: selfsigned-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
  isCA: true
  commonName: selfsigned-ca
  secretName: cert-manager-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
spec:
  ca:
    secretName: cert-manager-ca
{{- end }}

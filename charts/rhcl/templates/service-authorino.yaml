{{- if and .Values.kuadrant.create (and .Values.authorino.overwrite .Values.authorino.serviceTls) }}
apiVersion: v1
kind: Service
metadata:
  name: authorino-authorino-authorization
  namespace: {{ .Values.kuadrant.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: ServerSideApply=true
    service.beta.openshift.io/serving-cert-secret-name: {{ .Values.authorino.spec.listener.tls.certSecretRef.name }}
{{- end }}

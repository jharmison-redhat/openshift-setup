{{- if .Values.kuadrant.create }}
{{- $ns := (index (index $.Values "install-rhcl").operators "rhcl-operator").namespace | default "openshift-operators" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restart-kuadrant-operator
  namespace: {{ .Values.kuadrant.namespace }}
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: restart-kuadrant-operator-olm-view
  namespace: {{ $ns }}
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aggregate-olm-view
subjects:
  - kind: ServiceAccount
    name: restart-kuadrant-operator
    namespace: {{ .Values.kuadrant.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: restart-kuadrant-operator-namespace-edit
  namespace: {{ $ns }}
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: restart-kuadrant-operator
    namespace: {{ .Values.kuadrant.namespace }}
{{- end }}

{{- if .Values.backups.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "postgres-cluster.fullname" . }}
  {{- with .Values.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "postgres-cluster.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ quote .Values.backups.schedule }}
  backupOwnerReference: {{ .Values.backups.ownerReference }}
  cluster:
    name: {{ include "postgres-cluster.fullname" . }}
  method: {{ .Values.backups.method }}
{{- end }}

#       min: 2Gi
#       max: 60Gi
#       default: 16Gi
#     gpu:
#       nvidia.com/gpu:
#         max: 4
#         displayName: NVIDIA L40s

admins: []
userGroups:
  - system:authenticated

dashboardConfig: {}
# disableAcceleratorProfiles: false
# disableBYONImageStream: false
# disableClusterManager: false
# disableCustomServingRuntimes: false
# disableDistributedWorkloads: false
# disableHome: false
# disableISVBadges: false
# disableInfo: false
# disableKServe: false
# disableKServeAuth: false
# disableKServeMetrics: false
# disableModelMesh: true
# disableModelRegistry: false
# disableModelServing: false
# disablePerformanceMetrics: false
# disablePipelines: false
# disableProjectSharing: false
# disableProjects: false
# disableSupport: false
# disableTracking: true
# enablement: true
# tech preview
# disableHardwareProfiles: true
# disableModelCatalog: true
# #disableKueue: true
# #disableLMEval: true
# #disableFineTuning: true

defaultWorkbenchPvcSize: 20Gi
showJupyterInEnabledApplications: true
notebookIdleCulling:
  enabled: true
  timeoutInMinutes: 240

postgres-cluster:
  enabled: false
  nameOverride: maas
  namespace: maas-db
  databases:
    - name: maas
      user: maas

mlflow:
  create: true
  spec:
    storage:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
    backendStoreUri: "sqlite:////mlflow/mlflow.db"
    artifactsDestination: "file:///mlflow/artifacts"
    serveArtifacts: true
    image:
      imagePullPolicy: IfNotPresent

evalhub:
  create: false
  spec:
    replicas: 1
    database:
      type: sqlite
    env:
      - name: MLFLOW_TRACKING_URI
        value: https://mlflow.redhat-ods-applications.svc.cluster.local:8443
  tenant:
    create: true
    namespace: evalhub-tenant
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: User
        name: developer

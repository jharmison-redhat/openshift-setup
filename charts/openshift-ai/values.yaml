---
global:
  toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
  cluster:
    name: cluster
    baseDomain: example.com

install-rhoai:
  enabled: true
  operators:
    rhods-operator:
      channel: stable-3.4
      namespace: redhat-ods-operator
      operatorGroup:
        enabled: true
#   cluster-observability-operator:
#     channel: stable
#     namespace: openshift-cluster-observability-operator
#     operatorGroup:
#       enabled: true
#   opentelemetry-product:
#     channel: stable
#   openshift-custom-metrics-autoscaler-operator:
#     channel: stable
#     namespace: openshift-keda
#     operatorGroup:
#       enabled: true

rbac:
  create: true
  group: system:authenticated:oauth

mcpServers: {}

gateways:
  maasDefaultGateway:
    # only created if enabled in DSC
    useRoute: false
    certificate:
      create: true
      clusterIssuer: letsencrypt
  openshiftAiInference:
    create: true
    useRoute: false
    certificate:
      create: true
      clusterIssuer: letsencrypt

enableUserTelemetry: false

# If set, will override the deployment replica counts
dashboardReplicas: null
operatorReplicas: null

dataScienceCluster:
  create: true
  version: v2
  components:
    aipipelines:
      managementState: Managed
    dashboard:
      managementState: Managed
    feastoperator:
      managementState: Managed
    kserve:
      managementState: Managed
      modelsAsService:
        managementState: Removed
      nim:
        managementState: Managed
      rawDeploymentServiceConfig: Headed
    kueue:
      defaultClusterQueueName: default
      defaultLocalQueueName: default
      managementState: Removed
    llamastackoperator:
      managementState: Managed
    mlflowoperator:
      managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    ray:
      managementState: Managed
    trainer:
      managementState: Removed
    trainingoperator:
      managementState: Managed
    trustyai:
      eval:
        lmeval:
          permitCodeExecution: deny
          permitOnline: deny
      managementState: Managed
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks

dataScienceClusterInitialization:
  monitoring:
    managementState: Managed
    namespace: redhat-ods-monitoring
    metrics:
      storage:
        size: 5Gi
        retention: 1d

# applicationsNamespace: redhat-ods-applications
# monitoring:
#   managementState: Managed
#   namespace: redhat-ods-monitoring
#   metrics: {}
# trustedCABundle:
#   customCABundle: ""
#   managementState: Managed

hardwareProfiles: {}

# hardwareProfiles:
#   l40s:
#     node:
#       tolerations:
#         - key: nvidia.com/gpu
#           effect: NoSchedule
#           operator: Exists

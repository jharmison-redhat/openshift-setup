{{- with .Values.rbac }}
{{- if .create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-hardwareprofile-view
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hardwareprofiles.infrastructure.opendatahub.io-v1-view
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: {{ .group }}
{{- end }}
{{- end }}

{{- with .Values.evalhub }}
{{- if .create }}
{{- with .tenant }}
{{- if .create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-secret
  namespace: {{ .namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patch-secret
  namespace: {{ .namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: patch-secret
  namespace: {{ .namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: update-secret-minio
  namespace: {{ .namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: patch-secret
      restartPolicy: Never
      containers:
      - name: patch-secret
        image: {{ .Values.global.toolsImage }}
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
        - -exc
        - |-
          set -o pipefail

          while ! oc get secret ds-pipeline-s3-dspa >/dev/null 2>&1; do
            sleep 1
          done
          ACCESS=$(oc get secret ds-pipeline-s3-dspa \
            -o jsonpath='{.data.accesskey}' | base64 -d)
          SECRET=$(oc get secret ds-pipeline-s3-dspa \
            -o jsonpath='{.data.secretkey}' | base64 -d)
          ENDPOINT="http://minio-dspa.{{ .namespace }}.svc.cluster.local:9000"

          oc patch secret ds-pipeline-s3-dspa --type=merge -p "{
            \"stringData\": {
              \"AWS_ACCESS_KEY_ID\":     \"$ACCESS\",
              \"AWS_SECRET_ACCESS_KEY\": \"$SECRET\",
              \"AWS_S3_ENDPOINT\":       \"$ENDPOINT\",
              \"AWS_S3_BUCKET\":         \"mlpipeline\",
              \"AWS_DEFAULT_REGION\":    \"us-east-1\"
            }
          }"
{{- end }}
{{- end }}
{{- end }}
{{- end }}

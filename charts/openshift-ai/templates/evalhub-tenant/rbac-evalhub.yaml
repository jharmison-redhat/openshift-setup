{{- with .Values.evalhub }}
{{- if .create }}
{{- with .tenant }}
{{- if .create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: evalhub-jobs-dspa-api
  namespace: {{ .namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
- apiGroups: ["datasciencepipelinesapplications.opendatahub.io"]
  resources: ["datasciencepipelinesapplications/api"]
  verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: evalhub-jobs-dspa-api
  namespace: {{ .namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: evalhub-jobs-dspa-api
subjects:
- kind: ServiceAccount
  name: evalhub-redhat-ods-applications-job
  namespace: {{ .namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: evalhub-jobs-pipeline-management
  namespace: {{ .namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ds-pipeline-dspa
subjects:
- kind: ServiceAccount
  name: evalhub-redhat-ods-applications-job
  namespace: {{ .namespace }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

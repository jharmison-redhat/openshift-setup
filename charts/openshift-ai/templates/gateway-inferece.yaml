{{- with .Values.gateways.openshiftAiInference }}
{{- if .create }}
{{- $host := .hostname | default (printf "inference.apps.%s.%s" $.Values.cluster.name $.Values.cluster.baseDomain) }}
{{- if .useRoute }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openshift-ai-inference-config
  namespace: openshift-ingress
data:
  service: |
    spec:
      type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openshift-ai-inference
  namespace: openshift-ingress
spec:
  host: {{ $host }}
  port:
    targetPort: 80
  tls:
    insecureEdgeTerminationPolicy: Allow
    termination: edge
  to:
    kind: Service
    name: openshift-ai-inference-data-science-gateway-class
    weight: 100
  wildcardPolicy: None
{{- else if .certificate.create }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openshift-ai-inference-certificate
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  dnsNames:
    - {{ $host }}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: {{ .certificate.clusterIssuer }}
  secretName: openshift-ai-inference-cert
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openshift-ai-inference
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  gatewayClassName: data-science-gateway-class
  {{- if .useRoute }}
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: openshift-ai-inference-config
  {{- end }}
  listeners:
    {{- if .useRoute }}
    - name: http
      port: 80
      protocol: HTTP
      hostname: {{ $host }}
      allowedRoutes:
        namespaces:
          from: All
    {{- else }}
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ $host }}
      tls:
        certificateRefs:
        - group: ""
          kind: Secret
          name: openshift-ai-inference-cert
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
{{- end }}
{{- end }}

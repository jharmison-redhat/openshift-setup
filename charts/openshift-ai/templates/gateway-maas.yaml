{{- if eq .Values.dataScienceCluster.components.kserve.modelsAsService.managementState "Managed" }}
{{- with .Values.gateways.maasDefaultGateway }}
{{- $host := .hostname | default (printf "maas.apps.%s.%s" $.Values.global.cluster.name $.Values.global.cluster.baseDomain) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: maas-default-gateway-config
  namespace: openshift-ingress
data:
  {{- with .resources }}
  deployment: |
    spec:
      template:
        spec:
          containers:
          - name: istio-proxy
            resources:
              {{- toYaml . | nindent 16 }}
  {{- end }}
{{- if .useRoute }}
  service: |
    spec:
      type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
spec:
  host: {{ $host }}
  port:
    targetPort: 80
  tls:
    insecureEdgeTerminationPolicy: Allow
    termination: edge
  to:
    kind: Service
    name: maas-default-gateway-openshift-default
    weight: 100
  wildcardPolicy: None
{{- else if .certificate.create }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: maas-default-gateway-certificate
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  dnsNames:
    - {{ $host }}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: {{ .certificate.clusterIssuer }}
  secretName: maas-default-gateway-cert
{{- end }}
{{- if .disableIpp }}
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: ipp-disable
  namespace: openshift-ingress
  annotations:
    openshift.io/managed: "false"
    argocd.argoproj.io/sync-wave: "4"
spec:
  priority: 0
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: maas-default-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.ext_proc.bbr
      patch:
        operation: REMOVE
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
  labels:
    opendatahub.io/managed: "false"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
spec:
  gatewayClassName: data-science-gateway-class
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: maas-default-gateway-config
  listeners:
    {{- if .useRoute }}
    - name: http
      port: 80
      protocol: HTTP
      hostname: {{ $host }}
      allowedRoutes:
        namespaces:
          from: All
    {{- else }}
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ $host }}
      tls:
        certificateRefs:
        - group: ""
          kind: Secret
          name: maas-default-gateway-cert
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
{{- end }}
{{- end }}

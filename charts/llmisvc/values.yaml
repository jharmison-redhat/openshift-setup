fullnameOverride: ""
displaynameOverride: ""

image:
  registry: registry.redhat.io
  repository: rhaii/vllm-cuda-rhel9
  manifestHash: ""
  tag: ""

router:
  createScheduler: false
  createRoute: true
  route: {}
  scheduler: {}
  gateway: {} # the gateway used toggles between maas-default-gateway and openshift-ai-inference, unless specified here

replicas: 1
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  wva:
    keda:
      pollingInterval: 5
      cooldownPeriod: 30

huggingface: # used in pvc preload or model itself if no preload
  downloadArgs: []
  token: ""

model:
  name: qwen3-8b
  uri: oci://registry.redhat.io/rhelai1/modelcar-qwen3-8b-fp8-dynamic:1.5
  pvc: # only matters if uri starts with hf:// and what you really want is a pvc
    preload: false
    mode: ReadWriteOnce
    size: 20Gi
  args: []
  # - --enable-reasoning
  # - --reasoning-parser=deepseek_r1

resources:
  limits:
    cpu: "6"
    memory: 24Gi
    #nvidia.com/gpu: "1"
  requests:
    cpu: "2"
    memory: 12Gi
    #nvidia.com/gpu: "1"

env: []
annotations: {}
labels: {}
nodeSelector: {}
  # nvidia.com/gpu.present: "true"
tolerations: []
# - key: nvidia.com/gpu
#   effect: NoSchedule
#   operator: Exists

modelType: generative
enableAuth: true

genaiAsset:
  enabled: false
  useCase: chat

hardwareProfile:
  enabled: false
  name: gpu
  namespace: redhat-ods-applications

dataScienceConnection:
  create: true
  name: ""

maas:
  enabled: false
  subjects:
    groups:
      - name: system:authenticated
    users: []

{{- with .Values.huggingface.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llminferenceservice.fullname" $ }}-token
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "5"
  labels:
    {{- include "llminferenceservice.labels" $ | nindent 4 }}
type: Opaque
data:
  HF_TOKEN: {{ . | b64enc }}
{{- end }}

  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bucketclasses.noobaa.io-v1alpha1-view
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: {{ .group }}
{{- end }}
{{- end }}

{{- with .Values.rbac }}
{{- if .create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cephcluster-cluster-visibility
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cephclusters.ceph.rook.io-v1-view
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: {{ .group }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cephobjectstores-cluster-visibility
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cephobjectstores.ceph.rook.io-v1-view
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: {{ .group }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: noobaa-cluster-visibility
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: noobaas.noobaa.io-v1alpha1-view
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: {{ .group }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: storageclusters-cluster-visibility
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: storageclusters.ocs.openshift.io-v1-view
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: {{ .group }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bucketclass-cluster-visibility

displaynameOverride: "Llama 4 Scout"

model:
  name: llama-4-scout
  uri: oci://registry.redhat.io/rhelai1/modelcar-llama-4-scout-17b-16e-instruct-quantized-w4a16:1.5
  args:
    - --max-model-len=400000
    - --enable-force-include-usage
    - --distributed-executor-backend=mp
    - --nnodes=1
    - --tensor-parallel-size=4
    - --trust-remote-code
    - --enable-auto-tool-choice
    - --tool-call-parser=llama4_pythonic
    - --chat-template=/opt/app-root/template/tool_chat_template_llama4_pythonic.jinja

hardwareProfile:
  name: l40s

resources:
  limits:
    cpu: "16"
    memory: 256Gi
    nvidia.com/gpu: "4"
  requests:
    cpu: "2"
    memory: 32Gi
    nvidia.com/gpu: "4"

dataScienceConnection:
  name: secret-btgrkg
maas:
  enabled: true

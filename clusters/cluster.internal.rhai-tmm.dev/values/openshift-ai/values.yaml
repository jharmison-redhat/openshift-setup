install-rhoai:
  operators:
    cluster-observability-operator:
      channel: stable
      namespace: openshift-cluster-observability-operator
      operatorGroup:
        enabled: true
    opentelemetry-product:
      channel: stable
    openshift-custom-metrics-autoscaler-operator:
      channel: stable
      namespace: openshift-keda
      operatorGroup:
        enabled: true

dashboardReplicas: 1
operatorReplicas: 1
dataScienceCluster:
  components:
    kserve:
      modelsAsService:
        managementState: Managed
      wva:
        managementState: Managed

mcpServers:
  GitHub-MCP-Server:
    url: https://api.githubcopilot.com/mcp
    description: The GitHub MCP server enables exploration and interaction with
      repositories, code, and developer resources on GitHub. It provides
      programmatic access to repositories, issues, pull requests, and related
      project data, allowing automation and integration within development
      workflows. With this service, developers can query repositories, discover
      project metadata, and streamline code-related tasks through MCP-compatible
      tools.

dashboardConfig:
  disableKServeMetrics: false
  disableLMEval: false
  genAiStudio: true
  modelAsService: true
  observabilityDashboard: true

hardwareProfiles:
  l40s:
    node:
      tolerations:
        - key: nvidia.com/gpu
          effect: NoSchedule
          operator: Exists
    displayName: NVIDIA L40s
    cpu:
      min: 2
      max: 40
      default: 2
    memory:
      min: 2Gi
      max: 256Gi
      default: 16Gi
    gpu:
      nvidia.com/gpu:
        max: 4
        displayName: NVIDIA L40s

postgres-cluster:
  enabled: true
